name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          outputs: type=docker,dest=${{ runner.temp }}/100-tools.tar
          tags: 100-tools:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "${{ runner.temp }}/100-tools.tar"
          target: "/tmp"
          strip_components: 0

      - name: Load image and restart on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            docker load -i /tmp/100-tools.tar
            docker compose -f ${{ secrets.REMOTE_APP_DIR }}/docker-compose.yml down
            docker compose -f ${{ secrets.REMOTE_APP_DIR }}/docker-compose.yml up -d
            docker image prune -f
            rm -f /tmp/100-tools.tar
