name: Build & Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          outputs: type=docker,dest=${{ runner.temp }}/100-tools.tar
          tags: 100-tools:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package image + compose
        run: |
          cp docker-compose.yml ${{ runner.temp }}
          tar czf ${{ runner.temp }}/deploy.tar.gz \
            -C ${{ runner.temp }} 100-tools.tar docker-compose.yml

      - name: Upload to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "${{ runner.temp }}/deploy.tar.gz"
          target: "/tmp"
          strip_components: 0

      - name: Extract, load & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}
            tar xzf /tmp/deploy.tar.gz -C .
            docker load -i 100-tools.tar
            docker compose down
            docker compose up -d
            rm -f 100-tools.tar
            docker image prune -f
            rm -f /tmp/deploy.tar.gz
